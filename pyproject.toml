[tool.ruff]
line-length = 120
target-version = "py313"
src = ["backend"]
exclude = ["backend/venv", "backend/alembic/versions", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC"]
ignore = ["B008", "ASYNC240", "E501"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"app/main.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
